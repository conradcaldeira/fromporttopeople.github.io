<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Freight Sales Dashboard (Offline)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --navy:#0B2942;
  --steel:#1D4E63;
  --cream:#F6F1E7;
  --paper:#FBF8F2;
  --ink:#1D1B16;
  --rust:#C4703C;
  --rust-deep:#A8582A;
  --sage:#5F8464;
  --amber:#C99A42;
  --slate:#7C8A93;
  --line:rgba(11,41,66,0.13);
  --danger:#B24C3E;
  --air:#4C7EA8;
  --sea:#2E7D6B;
  --land:#A8763C;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;}

.wrap{max-width:1440px;margin:0 auto;padding:28px 32px 60px;}

.header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:18px;padding-bottom:18px;border-bottom:2px solid var(--navy);
}
.h-title{font-family:'Roboto Slab',serif;font-size:28px;font-weight:700;color:var(--navy);}
.h-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--rust);text-transform:uppercase;margin-top:5px;}

.btn{
  font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
  padding:10px 18px;border-radius:6px;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:all 0.12s;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--rust);color:white;}
.btn-primary:hover{background:var(--rust-deep);}
.btn-ghost{background:transparent;color:var(--navy);border:1px solid var(--line);}
.btn-ghost:hover{background:rgba(11,41,66,0.04);}

/* Tabs */
.tabbar{display:flex;gap:6px;margin-bottom:22px;border-bottom:1px solid var(--line);}
.tab{
  padding:11px 18px;font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
  color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;
  display:flex;align-items:center;gap:7px;margin-bottom:-1px;
}
.tab:hover{color:var(--navy);}
.tab.active{color:var(--navy);border-bottom-color:var(--rust);}
.tab .num{
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--slate);
  background:rgba(11,41,66,0.06);padding:1px 7px;border-radius:10px;
}
.tab.active .num{background:rgba(196,112,60,0.15);color:var(--rust-deep);}

.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px;}
.stat-card{
  background:var(--paper);border:1px solid var(--line);border-radius:8px;
  padding:16px 18px;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent,var(--rust));}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--slate);margin-bottom:7px;}
.stat-value{font-family:'Roboto Slab',serif;font-size:26px;font-weight:700;color:var(--navy);}

.section-block{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:20px 22px;margin-bottom:20px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-family:'Roboto Slab',serif;font-size:15px;font-weight:600;color:var(--navy);}

.funnel{display:flex;gap:8px;}
.funnel-stage{flex:1;text-align:center;}
.funnel-bar{height:8px;border-radius:4px;background:var(--line);margin-bottom:8px;overflow:hidden;}
.funnel-fill{height:100%;border-radius:4px;}
.funnel-count{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;color:var(--navy);}
.funnel-label{font-size:11px;color:var(--slate);margin-top:2px;}

.followup-list{display:flex;flex-direction:column;}
.followup-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
.followup-item:last-child{border-bottom:none;}
.fu-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:white;background:var(--amber);padding:4px 8px;border-radius:5px;min-width:64px;text-align:center;}
.fu-date.overdue{background:var(--danger);}
.fu-body{flex:1;}
.fu-name{font-size:13px;font-weight:600;color:var(--navy);}
.fu-meta{font-size:11px;color:var(--slate);}

.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.chip{padding:6px 13px;border-radius:20px;border:1px solid var(--line);font-size:12px;font-weight:500;cursor:pointer;color:var(--slate);background:var(--paper);white-space:nowrap;}
.chip.active{background:var(--navy);color:var(--cream);border-color:var(--navy);}
.search-input{padding:9px 13px;border:1px solid var(--line);border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;width:230px;background:var(--paper);}
.search-input:focus{outline:none;border-color:var(--rust);}

.table-block{background:var(--paper);border:1px solid var(--line);border-radius:8px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:900px;}
th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.05em;text-transform:uppercase;color:var(--slate);padding:11px 12px;border-bottom:1px solid var(--line);background:rgba(11,41,66,0.02);white-space:nowrap;position:sticky;top:0;}
td{padding:11px 12px;font-size:12.5px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:middle;white-space:nowrap;}
tr:hover td{background:rgba(11,41,66,0.02);}
.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--steel);}

.mode-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;}
.mode-tag .sw{width:6px;height:6px;border-radius:50%;}

.status-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;}
.status-enquiry{background:rgba(124,138,147,0.15);color:var(--slate);}
.status-quoted{background:rgba(201,154,66,0.16);color:#8a6a1f;}
.status-booked{background:rgba(196,112,60,0.16);color:var(--rust-deep);}
.status-lost{background:rgba(178,76,62,0.13);color:var(--danger);}
.status-confirmed{background:rgba(196,112,60,0.16);color:var(--rust-deep);}
.status-transit{background:rgba(29,78,99,0.15);color:var(--steel);}
.status-delivered{background:rgba(95,132,100,0.16);color:var(--sage);}
.status-invoiced{background:rgba(95,132,100,0.16);color:var(--sage);}

.fu-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 8px;border-radius:5px;}
.fu-overdue{background:rgba(178,76,62,0.13);color:var(--danger);font-weight:600;}
.fu-soon{background:rgba(201,154,66,0.16);color:#8a6a1f;font-weight:600;}
.fu-ok{color:var(--slate);}

.row-actions{display:flex;gap:6px;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--slate);padding:4px 6px;border-radius:4px;font-size:12px;}
.icon-btn:hover{background:rgba(11,41,66,0.06);color:var(--navy);}

.empty-state{text-align:center;padding:56px 20px;color:var(--slate);}
.empty-state .em-title{font-family:'Roboto Slab',serif;font-size:16px;color:var(--navy);margin-bottom:6px;}
.empty-state .em-sub{font-size:13px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(11,41,66,0.45);align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--paper);border-radius:10px;max-width:600px;width:100%;max-height:88vh;overflow-y:auto;padding:26px 28px;}
.modal-title{font-family:'Roboto Slab',serif;font-size:18px;font-weight:600;color:var(--navy);margin-bottom:18px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:var(--slate);}
.form-field input,.form-field select,.form-field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;background:white;color:var(--ink);}
.form-field textarea{resize:vertical;min-height:56px;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:var(--rust);}
.modal-actions{display:flex;justify-content:space-between;margin-top:22px;}

.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:var(--cream);padding:12px 18px;border-radius:7px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);opacity:0;transform:translateY(8px);transition:all 0.25s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="h-title" id="pageTitle">Freight Sales Dashboard</div>
      <div class="h-sub" id="pageSub">KUWAIT – INDIA CORRIDOR</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="btn btn-ghost" id="dataFileBtn" onclick="openDataFileModal()" style="display:none;">📁 Data File</button>
      <button class="btn btn-ghost" onclick="backupData()">⬇ Backup Data</button>
      <button class="btn btn-ghost" onclick="document.getElementById('restoreInput').click()">⬆ Restore Data</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none">
      <div id="headerActions" style="display:flex;gap:10px;"></div>
    </div>
  </div>

  <div class="tabbar" id="tabbar"></div>

  <div id="content"></div>
  <input type="file" id="enquiryImportInput" accept=".xlsx,.xls,.csv" style="display:none">
  <input type="file" id="bookingImportInput" accept=".xlsx,.xls,.csv" style="display:none">
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ================= Storage ================= */
const KEYS = {
  enquiries: 'enquiry-dashboard:entries',
  bookings: 'enquiry-dashboard:bookings',
  contacts: 'enquiry-dashboard:contacts'
};
let DB = { enquiries: [], bookings: [], contacts: [] };

const FS_SUPPORTED = 'showSaveFilePicker' in window;
let fileHandle = null;
let pendingHandle = null;
let connectedFileName = '';

function idbOpen(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open('freight-dashboard-fs', 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore('handles');
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbSetHandle(handle){
  const db = await idbOpen();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readwrite');
    tx.objectStore('handles').put(handle, 'dataFile');
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbClearHandle(){
  const db = await idbOpen();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readwrite');
    tx.objectStore('handles').delete('dataFile');
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbGetHandle(){
  const db = await idbOpen();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readonly');
    const req = tx.objectStore('handles').get('dataFile');
    req.onsuccess = ()=>resolve(req.result || null);
    req.onerror = ()=>reject(req.error);
  });
}
async function writeToFileHandle(){
  if(!fileHandle) return;
  try{
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify({ enquiries: DB.enquiries, bookings: DB.bookings, contacts: DB.contacts }, null, 2));
    await writable.close();
  }catch(e){
    showToast('Could not save to your data file — check its permissions');
  }
}
async function loadFromFileHandle(){
  try{
    const file = await fileHandle.getFile();
    connectedFileName = file.name;
    const text = await file.text();
    const data = text.trim() ? JSON.parse(text) : {};
    DB.enquiries = data.enquiries || [];
    DB.bookings = data.bookings || [];
    DB.contacts = data.contacts || [];
  }catch(e){
    DB.enquiries = []; DB.bookings = []; DB.contacts = [];
  }
}

async function loadAll(){
  if(FS_SUPPORTED){
    try{
      const storedHandle = await idbGetHandle();
      if(storedHandle){
        const perm = await storedHandle.queryPermission({ mode:'readwrite' });
        if(perm === 'granted'){
          fileHandle = storedHandle;
          await loadFromFileHandle();
          return;
        }else{
          pendingHandle = storedHandle;
          try{ connectedFileName = (await storedHandle.getFile()).name; }catch(e){}
        }
      }
    }catch(e){ /* fall through to localStorage */ }
  }
  for(const [k,key] of Object.entries(KEYS)){
    try{ const raw = localStorage.getItem(key); DB[k] = raw ? JSON.parse(raw) : []; }
    catch(e){ DB[k] = []; }
  }
}
async function persist(k){
  if(fileHandle){ await writeToFileHandle(); return; }
  try{ localStorage.setItem(KEYS[k], JSON.stringify(DB[k])); }
  catch(e){ showToast('Save failed — your browser may be blocking local storage'); }
}
async function connectDataFile(createNew){
  try{
    let handle;
    if(createNew){
      handle = await window.showSaveFilePicker({ suggestedName:'freight-dashboard-data.json', types:[{ description:'JSON File', accept:{'application/json':['.json']} }] });
      fileHandle = handle;
      pendingHandle = null;
      await idbSetHandle(handle);
      await writeToFileHandle(); // migrate whatever is currently loaded into the new file
      connectedFileName = handle.name;
      showToast('Data file created and connected');
    }else{
      [handle] = await window.showOpenFilePicker({ types:[{ description:'JSON File', accept:{'application/json':['.json']} }] });
      const proceed = confirm('This will replace what\'s currently shown with the contents of that file. Continue?');
      if(!proceed) return;
      fileHandle = handle;
      pendingHandle = null;
      await idbSetHandle(handle);
      await loadFromFileHandle();
      showToast('Data file connected');
    }
    closeModal();
    renderAll();
  }catch(e){
    if(e.name !== 'AbortError') showToast('Could not connect that file');
  }
}
async function reconnectDataFile(){
  if(!pendingHandle) return;
  try{
    const perm = await pendingHandle.requestPermission({ mode:'readwrite' });
    if(perm === 'granted'){
      fileHandle = pendingHandle;
      pendingHandle = null;
      await loadFromFileHandle();
      renderAll();
      showToast('Data file reconnected');
    }else{
      showToast('Permission denied — using browser storage for now');
    }
  }catch(e){
    showToast('Could not reconnect that file');
  }
}
async function disconnectDataFile(){
  fileHandle = null;
  pendingHandle = null;
  connectedFileName = '';
  await idbClearHandle();
  await loadAll();
  closeModal();
  renderAll();
  showToast('Disconnected — now saving to browser storage');
}
function storageIsReliable(){
  try{
    const testKey = '__storage_test__';
    localStorage.setItem(testKey, '1');
    const ok = localStorage.getItem(testKey) === '1';
    localStorage.removeItem(testKey);
    return ok;
  }catch(e){ return false; }
}
function showStorageWarningIfNeeded(){
  if(fileHandle) return; // real file storage in use, no warning needed
  const banner = document.createElement('div');
  if(pendingHandle){
    banner.style.cssText = 'background:#C99A42;color:white;padding:12px 20px;font-family:Inter,sans-serif;font-size:13px;font-weight:600;text-align:center;cursor:pointer;';
    banner.innerHTML = `🔄 Click here to reconnect your data file "${connectedFileName}" — Chrome needs permission to be re-granted each session.`;
    banner.addEventListener('click', reconnectDataFile);
    document.body.insertBefore(banner, document.body.firstChild);
    return;
  }
  if(storageIsReliable()) return;
  banner.style.cssText = 'background:#B24C3E;color:white;padding:12px 20px;font-family:Inter,sans-serif;font-size:13px;font-weight:600;text-align:center;';
  banner.innerHTML = `⚠ Your browser is blocking local storage for this file, so entries will NOT be saved after a refresh. Use "Backup Data" before closing, and "Restore Data" to bring it back next time. This is common in Safari, or Chrome with strict privacy settings, when opening a file directly from disk.`;
  document.body.insertBefore(banner, document.body.firstChild);
}

/* ================= Constants ================= */
const MODES = [
  'Air Import','Air Export',
  'Sea FCL Import','Sea FCL Export',
  'Sea LCL Import','Sea LCL Export',
  'Land FTL Import','Land FTL Export',
  'Land LTL Import','Land LTL Export'
];
const VOLUME_UNITS = ['TEU','KG','CBM','TRIPS','SHPT'];
const ENQUIRY_STATUSES = ['Enquiry','Quoted']; // Lost / Booked are set via actions, not manual dropdown
const BOOKING_STATUSES = ['Confirmed','In Transit','Delivered','Invoiced'];
const SOURCES = ['Cold Call','Cold Visit','Referral','Inbound','Trade Show','Other'];

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayIso(){ return new Date().toISOString().slice(0,10); }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function daysAhead(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});
}
function modeGroup(mode){
  if(!mode) return 'other';
  if(mode.startsWith('Air')) return 'air';
  if(mode.startsWith('Sea')) return 'sea';
  if(mode.startsWith('Land')) return 'land';
  return 'other';
}
function modeColor(mode){
  const g = modeGroup(mode);
  return g==='air' ? 'var(--air)' : g==='sea' ? 'var(--sea)' : g==='land' ? 'var(--land)' : 'var(--slate)';
}
function statusClass(status){
  const map = { 'Enquiry':'status-enquiry','Quoted':'status-quoted','Booked':'status-booked','Lost':'status-lost',
    'Confirmed':'status-confirmed','In Transit':'status-transit','Delivered':'status-delivered','Invoiced':'status-invoiced' };
  return 'status-tag ' + (map[status] || 'status-enquiry');
}
function profitOf(b){
  const cost = parseFloat(b.costRate), sell = parseFloat(b.sellRate);
  if(isNaN(cost) || isNaN(sell)) return null;
  return sell - cost;
}
function fmtMoney(n){
  if(n===null || n===undefined || isNaN(n)) return '—';
  return n.toFixed(3);
}
function sumQtyByUnit(list){
  const totals = {}; VOLUME_UNITS.forEach(u=>totals[u]=0);
  list.forEach(r=>{
    const u = r.volumeUnit, q = parseFloat(r.qty);
    if(u && VOLUME_UNITS.includes(u) && !isNaN(q)) totals[u]+=q;
  });
  return totals;
}
function followUpTag(iso){
  if(!iso) return `<span class="fu-tag fu-ok">—</span>`;
  const today = todayIso();
  if(iso < today) return `<span class="fu-tag fu-overdue">${fmtDate(iso)}</span>`;
  if(iso <= daysAhead(2)) return `<span class="fu-tag fu-soon">${fmtDate(iso)}</span>`;
  return `<span class="fu-tag fu-ok">${fmtDate(iso)}</span>`;
}

/* ================= Seed ================= */
function seedIfEmpty(){
  if(DB.enquiries.length || DB.bookings.length || DB.contacts.length) return;
  const c1 = { id: uid(), company:'Al Rasheed Auto Spares', person:'Yousef Al Rasheed', phone:'+965 5012 3344', email:'yousef@rasheedauto.com', sector:'Automobile & Spare Parts', source:'Cold Visit' };
  const c2 = { id: uid(), company:'Bhavani Motors Pvt Ltd', person:'Rakesh Bhavani', phone:'+91 98200 11223', email:'rakesh@bhavanimotors.in', sector:'Automobile & Spare Parts', source:'Referral' };
  DB.contacts = [c1, c2];
  DB.enquiries = [
    { id: uid(), enquiryDate: daysAgo(4), customer:c1.company, mode:'Sea FCL Export', pol:'Shuwaikh, Kuwait', pod:'Nhava Sheva, India', volumeUnit:'TEU', qty:'2', enquiryNo:'ENQ-0142', status:'Quoted', followUpDate: daysAhead(1), emailRef:'RE: Auto spares 2x40ft - rate request' },
    { id: uid(), enquiryDate: daysAgo(10), customer:c2.company, mode:'Sea LCL Import', pol:'Nhava Sheva, India', pod:'Shuwaikh, Kuwait', volumeUnit:'CBM', qty:'6', enquiryNo:'ENQ-0139', status:'Booked', followUpDate: '', emailRef:'Brake components LCL - booked' }
  ];
  DB.bookings = [
    { id: uid(), enquiryId: DB.enquiries[1].id, customer:c2.company, ref:'DPW-KWI-1042', mode:'Sea LCL Import', pol:'Nhava Sheva, India', pod:'Shuwaikh, Kuwait', volumeUnit:'CBM', qty:'6', etd: daysAhead(4), eta: daysAhead(14), status:'Confirmed', remarks:'First shipment for this account' }
  ];
  persist('contacts'); persist('enquiries'); persist('bookings');
}

/* ================= Tabs ================= */
const TABS = [
  { key:'dashboard', label:'Dashboard' },
  { key:'enquiries', label:'Enquiries' },
  { key:'bookings', label:'Bookings' },
  { key:'pivot', label:'Pivot' },
  { key:'contacts', label:'Contacts' }
];
let currentTab = 'dashboard';
let enquiryModeFilter = 'All';
let bookingStatusFilter = 'All';
let searchTerm = '';
let pivotDataset = 'enquiries';
let pivotGroupBy = 'customer';
let pivotUnitFilter = 'All';

function renderTabbar(){
  document.getElementById('tabbar').innerHTML = TABS.map(t=>{
    const count = t.key==='enquiries'?DB.enquiries.length: t.key==='bookings'?DB.bookings.length: t.key==='contacts'?DB.contacts.length:null;
    return `<div class="tab ${currentTab===t.key?'active':''}" data-tab="${t.key}">
      ${t.label}${count!==null?`<span class="num">${count}</span>`:''}
    </div>`;
  }).join('');
  document.querySelectorAll('.tab').forEach(el=>{
    el.addEventListener('click',()=>{ currentTab = el.dataset.tab; searchTerm=''; renderAll(); });
  });
}

function renderDashboard(){
  setHeader('OVERVIEW — ' + new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}).toUpperCase(), '');

  const openEnq = DB.enquiries.filter(e=>['Enquiry','Quoted'].includes(e.status)).length;
  const quoted = DB.enquiries.filter(e=>e.status==='Quoted').length;
  const bookedThisMonth = DB.bookings.filter(b=>{
    if(!b.etd) return false;
    const d = new Date(b.etd), now = new Date();
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).length;
  const dueFollowups = DB.enquiries.filter(e=> e.followUpDate && e.followUpDate <= daysAhead(2) && !['Booked','Lost'].includes(e.status));

  const stages = ['Enquiry','Quoted','Booked','Shipped','Delivered'];
  const stageColors = { Enquiry:'var(--slate)', Quoted:'var(--amber)', Booked:'var(--rust)', Shipped:'var(--steel)', Delivered:'var(--sage)' };
  const combined = [
    ...DB.enquiries.map(e=>e.status),
    ...DB.bookings.map(b=> b.status==='Confirmed' ? 'Booked' : b.status==='In Transit' ? 'Shipped' : (b.status==='Delivered'||b.status==='Invoiced') ? 'Delivered' : b.status)

  const recentBookings = DB.bookings.slice().sort((a,b)=>(b.etd||'').localeCompare(a.etd||'')).slice(0,5);

  const bookingsWithProfit = DB.bookings.map(b=>profitOf(b)).filter(p=>p!==null);
  const totalProfit = bookingsWithProfit.reduce((s,p)=>s+p,0);

  const enqUnitTotals = sumQtyByUnit(DB.enquiries);
  const bkgUnitTotals = sumQtyByUnit(DB.bookings);

  document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card" style="--accent:var(--slate)"><div class="stat-label">Open Enquiries</div><div class="stat-value">${openEnq}</div></div>
      <div class="stat-card" style="--accent:var(--amber)"><div class="stat-label">Quoted</div><div class="stat-value">${quoted}</div></div>

      <div class="stat-card" style="--accent:var(--danger)"><div class="stat-label">Follow-ups due</div><div class="stat-value">${dueFollowups.length}</div></div>
      <div class="stat-card" style="--accent:${totalProfit<0?'var(--danger)':'var(--sage)'}"><div class="stat-label">Total Profit (KWD)</div><div class="stat-value" style="color:${totalProfit<0?'var(--danger)':'var(--sage)'}">${fmtMoney(totalProfit)}</div></div>
    </div>

    <div class="section-block">
      <div class="section-head"><div class="section-title">Volume Summary</div></div>
      <div class="table-block" style="border:none;"><table>
        <thead><tr><th>Unit</th>${VOLUME_UNITS.map(u=>`<th>${u}</th>`).join('')}</tr></thead>
        <tbody>
          <tr><td><strong>Enquiries</strong></td>${VOLUME_UNITS.map(u=>`<td class="mono">${enqUnitTotals[u]?enqUnitTotals[u].toLocaleString():'—'}</td>`).join('')}</tr>
          <tr><td><strong>Bookings</strong></td>${VOLUME_UNITS.map(u=>`<td class="mono">${bkgUnitTotals[u]?bkgUnitTotals[u].toLocaleString():'—'}</td>`).join('')}</tr>
        </tbody>
      </table></div>
    </div>

    <div class="section-block">
      <div class="section-head"><div class="section-title">Pipeline</div></div>
      <div class="funnel">
        ${stages.map(s=>{
          const cnt = combined.filter(x=>x===s).length;
          const pct = Math.max(8, Math.round((cnt/maxCount)*100));
          return `<div class="funnel-stage">

/* ================= Pivot ================= */
const PIVOT_FIELDS = [
  { key:'customer', label:'Customer' },
  { key:'mode', label:'Mode of Transport' },
  { key:'status', label:'Status' },
  { key:'pol', label:'POL' },
  { key:'pod', label:'POD' },
  { key:'volumeUnit', label:'Volume Unit' }
];
function computePivot(dataset, groupBy, unitFilter){
  let list = DB[dataset].slice();
  if(unitFilter!=='All') list = list.filter(r=>r.volumeUnit===unitFilter);
  const groups = {};
  list.forEach(r=>{
    const key = r[groupBy] || '—';
    if(!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  return Object.entries(groups).map(([key, items])=>{
    const qtyTotals = sumQtyByUnit(items);
    const row = { key, count: items.length, qtyTotals };
    if(dataset==='bookings'){
      const profits = items.map(profitOf).filter(p=>p!==null);
      row.profitTotal = profits.length ? profits.reduce((s,p)=>s+p,0) : null;
    }
    return row;
  }).sort((a,b)=>b.count-a.count);
}
function renderPivot(){
  setHeader('GROUP & FILTER', '');
  const fieldOptions = PIVOT_FIELDS.map(f=>`<option value="${f.key}" ${pivotGroupBy===f.key?'selected':''}>${f.label}</option>`).join('');
  const rows = computePivot(pivotDataset, pivotGroupBy, pivotUnitFilter);
  const activeUnits = VOLUME_UNITS.filter(u=>rows.some(r=>r.qtyTotals[u]));

  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <div class="filter-row">
        <div class="chip ${pivotDataset==='enquiries'?'active':''}" data-pd="enquiries">Enquiries</div>
        <div class="chip ${pivotDataset==='bookings'?'active':''}" data-pd="bookings">Bookings</div>
        <select id="pivotGroupSelect" style="padding:7px 11px;border:1px solid var(--line);border-radius:20px;font-size:12px;font-family:'Inter',sans-serif;background:var(--paper);color:var(--navy);font-weight:500;">${fieldOptions}</select>
      </div>
      <div class="filter-row">
        ${['All',...VOLUME_UNITS].map(u=>`<div class="chip ${pivotUnitFilter===u?'active':''}" data-pu="${u}">${u}</div>`).join('')}
      </div>
    </div>
    <div class="table-block">
      ${rows.length ? `<table>
        <thead><tr><th>${PIVOT_FIELDS.find(f=>f.key===pivotGroupBy).label}</th><th>Count</th>${activeUnits.map(u=>`<th>${u}</th>`).join('')}${pivotDataset==='bookings'?'<th>P&L (KWD)</th>':''}</tr></thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td><strong>${r.key}</strong></td>
              <td class="mono">${r.count}</td>
              ${activeUnits.map(u=>`<td class="mono">${r.qtyTotals[u]?r.qtyTotals[u].toLocaleString():'—'}</td>`).join('')}
              ${pivotDataset==='bookings'?`<td class="mono" style="color:${r.profitTotal===null?'var(--slate)':r.profitTotal<0?'var(--danger)':'var(--sage)'}">${fmtMoney(r.profitTotal)}</td>`:''}
            </tr>`).join('')}
        </tbody>
      </table>` : `<div class="empty-state"><div class="em-title">Nothing to show</div><div class="em-sub">Try a different dataset or filter.</div></div>`}
    </div>
  `;
  document.querySelectorAll('[data-pd]').forEach(el=>el.addEventListener('click',()=>{ pivotDataset=el.dataset.pd; renderPivot(); }));
  document.querySelectorAll('[data-pu]').forEach(el=>el.addEventListener('click',()=>{ pivotUnitFilter=el.dataset.pu; renderPivot(); }));
  const sel = document.getElementById('pivotGroupSelect');
  if(sel) sel.addEventListener('change', e=>{ pivotGroupBy = e.target.value; renderPivot(); });
}

/* ================= Excel Import ================= */
const ENQUIRY_IMPORT_MAP = {
  'date of enquiry':'enquiryDate','enquiry date':'enquiryDate',
  'customer name':'customer','customer':'customer',
  'mode of transport':'mode','mode':'mode',
  'pol':'pol','port of loading':'pol',
  'pod':'pod','port of discharge':'pod',
  'volume':'volumeUnit',
  'qty':'qty','quantity':'qty',
  'enquiry no':'enquiryNo','enquiry number':'enquiryNo',
  'status':'status',
  'date of follow up':'followUpDate','follow up date':'followUpDate','follow up':'followUpDate',
  'email reference':'emailRef','email ref':'emailRef'
};
const BOOKING_IMPORT_MAP = {
  'booking ref':'ref','ref':'ref','reference':'ref',
  'customer name':'customer','customer':'customer',
  'mode of transport':'mode','mode':'mode',
  'pol':'pol','port of loading':'pol',
  'pod':'pod','port of discharge':'pod',
  'volume':'volumeUnit',
  'qty':'qty','quantity':'qty',
  'etd':'etd','eta':'eta',
  'status':'status',
  'cost rate':'costRate','cost':'costRate','cost rate kwd':'costRate',
  'sell rate':'sellRate','sell':'sellRate','sell rate kwd':'sellRate',
  'remarks':'remarks','notes':'remarks'
};
function normalizeHeader(h){
  return h.toString().toLowerCase().replace(/\(.*?\)/g,'').replace(/[^a-z0-9]+/g,' ').trim();
}
function excelDateToIso(val){
  if(val===undefined || val===null || val==='') return '';
  if(val instanceof Date && !isNaN(val)) return val.toISOString().slice(0,10);
  if(typeof val === 'number' && window.XLSX && XLSX.SSF){
    const d = XLSX.SSF.parse_date_code(val);
    if(d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  const parsed = new Date(val);
  if(!isNaN(parsed)) return parsed.toISOString().slice(0,10);
  return '';
}
const DATE_FIELDS = ['enquiryDate','followUpDate','etd','eta'];

function handleExcelImport(kind, file){
  const reader = new FileReader();
  reader.onload = async function(evt){
    try{
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(!rows.length){ showToast('No rows found in that file'); return; }

      const map = kind==='enquiries' ? ENQUIRY_IMPORT_MAP : BOOKING_IMPORT_MAP;
      let imported = 0;
      rows.forEach(row=>{
        const rec = { id: uid() };
        Object.keys(row).forEach(h=>{
          const field = map[normalizeHeader(h)];
          if(!field) return;
          let val = row[h];
          if(DATE_FIELDS.includes(field)) val = excelDateToIso(val);
          else val = (val===undefined||val===null) ? '' : String(val).trim();
          rec[field] = val;
        });
        if(!rec.customer) return; // skip rows with no customer name
        if(kind==='enquiries' && !rec.status) rec.status = 'Enquiry';
        DB[kind].push(rec);
        ensureContactExists(rec.customer);
        imported++;
      });

      if(imported){
        await persist(kind);
        renderAll();
        showToast(`Imported ${imported} row${imported===1?'':'s'} from Excel`);
      }else{
        showToast('No matching rows found — check the column headers');
      }
    }catch(err){
      showToast('Could not read that Excel file');
    }
  };
  reader.readAsArrayBuffer(file);
}
document.getElementById('enquiryImportInput').addEventListener('change', e=>{
  const f = e.target.files[0]; if(f) handleExcelImport('enquiries', f); e.target.value = '';
});
document.getElementById('bookingImportInput').addEventListener('change', e=>{
  const f = e.target.files[0]; if(f) handleExcelImport('bookings', f); e.target.value = '';
});

/* ================= Backup / Restore ================= */
function backupData(){
  const payload = {
    exportedAt: new Date().toISOString(),
    enquiries: DB.enquiries,
    bookings: DB.bookings,
    contacts: DB.contacts
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `freight-dashboard-backup-${todayIso()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup file downloaded');
}
document.getElementById('restoreInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(evt){
    try{
      const data = JSON.parse(evt.target.result);
      if(!data.enquiries && !data.bookings && !data.contacts){
        showToast('This file doesn\'t look like a valid backup');
        return;
      }
      const proceed = confirm('This will replace all current data in this dashboard with the backup file. Continue?');
      if(!proceed){ e.target.value = ''; return; }
      DB.enquiries = data.enquiries || [];
      DB.bookings = data.bookings || [];
      DB.contacts = data.contacts || [];
      await persist('enquiries'); await persist('bookings'); await persist('contacts');
      renderAll();
      showToast('Data restored from backup');
    }catch(err){
      showToast('Could not read that file — is it a valid backup JSON?');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

/* ================= Delete / Toast ================= */
function deleteRecord(kind, id){
  if(kind==='bookings'){
    const b = DB.bookings.find(x=>x.id===id);
    if(b && b.enquiryId){
      const linkedEnquiry = DB.enquiries.find(e=>e.id===b.enquiryId);
      if(linkedEnquiry && linkedEnquiry.status==='Booked'){
        const revert = confirm('This booking was created from an enquiry, which is still marked "Booked". Revert that enquiry back to "Quoted"?');
        if(revert){
          DB.enquiries = DB.enquiries.map(e=>e.id===b.enquiryId?{...e, status:'Quoted'}:e);
          persist('enquiries');
        }
      }
    }
  }
  DB[kind] = DB[kind].filter(x=>x.id!==id);
  persist(kind);
  renderAll();
  showToast('Deleted');
}
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}
document.getElementById('modalOverlay').addEventListener('click',(e)=>{ if(e.target.id==='modalOverlay') closeModal(); });

/* ================= Dispatch ================= */
function renderAll(){
  renderTabbar();
  updateDataFileButton();
  if(currentTab==='dashboard') renderDashboard();
  else if(currentTab==='enquiries') renderEnquiries();
  else if(currentTab==='bookings') renderBookings();
  else if(currentTab==='pivot') renderPivot();
  else if(currentTab==='contacts') renderContacts();
}

  document.getElementById('content').innerHTML = `<div class="empty-state"><div class="em-title">Loading your dashboard…</div></div>`;
  await loadAll();
  showStorageWarningIfNeeded();
  seedIfEmpty();
  renderAll();
})();
